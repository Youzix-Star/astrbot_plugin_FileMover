<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件分发中心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" data-theme="light">
        <header>
            <h1>📁 文件分发中心</h1>
            <p>上传文件，一键分发到多个群聊</p>
        </header>

        <main>
            <!-- 上传区域 -->
            <section class="upload-area" id="uploadArea">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-content">
                        <span class="icon">📤</span>
                        <p>拖拽文件到这里，或点击选择文件</p>
                        <small>支持所有文件类型</small>
                    </div>
                    <input type="file" id="fileInput" style="display:none">
                </div>
                <div class="file-info" id="fileInfo" style="display:none">
                    <span class="file-name" id="fileName"></span>
                    <span class="file-size" id="fileSize"></span>
                    <button class="btn-remove" id="removeFile">✕</button>
                </div>
            </section>

            <!-- 配置区域 -->
            <section class="config-area">
                <div class="form-group">
                    <label>目标群（可多选）</label>
                    <div class="group-select" id="groupSelect">
                        <div class="loading">加载群列表中...</div>
                    </div>
                    <small>按住 Ctrl 或 Cmd 可多选</small>
                </div>

                <div class="form-group">
                    <label>目标文件夹（可选）</label>
                    <select id="folderSelect">
                        <option value="">（根目录）</option>
                    </select>
                    <small>文件将上传到指定文件夹，若不存在则自动创建</small>
                </div>

                <div class="form-group">
                    <label>自动分类</label>
                    <div class="auto-classify">
                        <input type="checkbox" id="autoClassify">
                        <label for="autoClassify">根据文件名自动匹配文件夹（使用已配置的映射规则）</label>
                    </div>
                </div>

                <button class="btn-distribute" id="distributeBtn" disabled>
                    分发文件
                </button>
            </section>

            <!-- 进度/结果区域 -->
            <section class="result-area" id="resultArea" style="display:none">
                <h3>分发结果</h3>
                <div class="progress-stats">
                    <span class="stat total">总计: <b id="totalCount">0</b></span>
                    <span class="stat success">✅ 成功: <b id="successCount">0</b></span>
                    <span class="stat failed">❌ 失败: <b id="failedCount">0</b></span>
                </div>
                <div class="result-list" id="resultList"></div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
